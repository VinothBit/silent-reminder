<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Silent Reminder</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#121212;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app{
    width:360px;
    height:740px;
    background:#1e1e1e;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    position:relative;
}

/* HEADER */

.header{
    background:#7c3aed;
    padding:20px;
    text-align:center;
}

.header h1{
    font-size:24px;
}

/* CONTENT */

.content{
    padding:20px;
    overflow-y:auto;
    height:620px;
}

/* CARD */

.card{
    background:#2a2a2a;
    padding:15px;
    border-radius:18px;
    margin-bottom:15px;
}

.card h3{
    margin-bottom:8px;
}

.time{
    color:#a78bfa;
    font-size:14px;
}

/* BUTTON */

.add-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#7c3aed;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.add-btn:hover{
    background:#6d28d9;
}

/* INPUT */

input, select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#333;
    color:white;
}

/* PRIORITY */

.priority{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.priority button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
}

.low{
    background:#16a34a;
}

.medium{
    background:#f59e0b;
}

.high{
    background:#dc2626;
}

/* BOTTOM NAV */

.nav{
    position:absolute;
    bottom:0;
    width:100%;
    background:#272727;
    display:flex;
    justify-content:space-around;
    padding:15px 0;
}

.nav button{
    background:none;
    border:none;
    color:white;
    font-size:14px;
    cursor:pointer;
}

.nav button:hover{
    color:#a78bfa;
}

</style>
</head>

<body>

<div class="app">

    <div class="header">
        <h1>Silent Reminder</h1>
    </div>

    <div class="content">

        <!-- ADD REMINDER -->

        <div class="card">
            <h3>Add Reminder</h3>

            <input type="text" id="title" placeholder="Reminder title">

            <input type="time" id="time">

            <select id="category">
                <option>Work</option>
                <option>Personal</option>
                <option>Study</option>
                <option>Meeting</option>
            </select>

            <div class="priority">
                <button class="low">Low</button>
                <button class="medium">Medium</button>
                <button class="high">High</button>
            </div>

            <button class="add-btn" onclick="addReminder()">
                Add Reminder
            </button>
        </div>

        <!-- REMINDER LIST -->

        <div id="reminder-list"></div>

    </div>

    <!-- BOTTOM NAV -->

    <div class="nav">
        <button>Home</button>
        <button>Reminder</button>
        <button>Settings</button>
    </div>

</div>

<script>

const reminderList = document.getElementById("reminder-list");

function addReminder(){

    const title = document.getElementById("title").value;
    const time = document.getElementById("time").value;
    const category = document.getElementById("category").value;

    if(title === "" || time === ""){
        alert("Please fill all fields");
        return;
    }

    const card = document.createElement("div");
    card.classList.add("card");

    card.innerHTML = `
        <h3>${title}</h3>
        <p class="time">${time}</p>
        <p>${category}</p>
    `;

    reminderList.appendChild(card);

    document.getElementById("title").value = "";
    document.getElementById("time").value = "";

}

</script>

</body>
</html>
